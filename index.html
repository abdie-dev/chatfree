<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Command Center | BIWWDEV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .font-mono-custom { font-family: 'JetBrains Mono', monospace; }
        body { background: #0A0A0F; }
        .glass-panel { background: rgba(15, 25, 35, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.2); }
        .glass-card { background: rgba(10, 15, 25, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(59, 130, 246, 0.15); transition: all 0.2s ease; }
        .glass-card:hover { border-color: rgba(59, 130, 246, 0.4); background: rgba(15, 25, 40, 0.6); }
        .gradient-text { background: linear-gradient(135deg, #60A5FA, #A855F7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .progress-bar { transition: width 0.3s ease; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1A1A2E; }
        ::-webkit-scrollbar-thumb { background: #3B82F6; border-radius: 10px; }
        input, textarea, select { outline: none; }
        .habit-checkbox:checked + span { text-decoration: line-through; opacity: 0.6; }
        @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 5px rgba(59,130,246,0.3); } 50% { box-shadow: 0 0 15px rgba(59,130,246,0.6); } }
        .focus-glow:focus { animation: pulse-glow 1s infinite; border-color: #3B82F6; }
    </style>
</head>
<body class="text-gray-200">

<div x-data="commandCenter()" x-init="init()" class="min-h-screen p-4 md:p-6">
    
    <!-- Header -->
    <div class="max-w-7xl mx-auto mb-6">
        <div class="flex justify-between items-center flex-wrap gap-3">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
                    <span class="text-xl">⚡</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">COMMAND CENTER</h1>
                    <p class="text-[10px] text-gray-400 font-mono-custom">personal dashboard • offline first</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button @click="exportData()" class="px-4 py-2 bg-blue-600/20 hover:bg-blue-600/40 border border-blue-500/30 rounded-lg text-sm transition flex items-center gap-2">
                    📤 Export
                </button>
                <label class="px-4 py-2 bg-purple-600/20 hover:bg-purple-600/40 border border-purple-500/30 rounded-lg text-sm transition flex items-center gap-2 cursor-pointer">
                    📥 Import
                    <input type="file" @change="importData($event)" accept=".json" class="hidden">
                </label>
                <button @click="resetAll()" class="px-4 py-2 bg-red-600/20 hover:bg-red-600/40 border border-red-500/30 rounded-lg text-sm transition">Reset</button>
            </div>
        </div>
    </div>
    
    <!-- Main Grid -->
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-5">
        
        <!-- LEFT COLUMN: Weather + Time + Sholat -->
        <div class="space-y-5">
            <!-- Time & Date -->
            <div class="glass-panel rounded-2xl p-5 text-center">
                <div class="font-mono-custom text-4xl md:text-5xl font-bold tracking-wider" x-text="time"></div>
                <div class="text-gray-400 text-sm mt-1" x-text="date"></div>
                <div class="text-xs text-blue-400 mt-2">📍 Local time</div>
            </div>
            
            <!-- Weather (Manual input, karena gratis tanpa API key) -->
            <div class="glass-card rounded-2xl p-5">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-sm font-semibold uppercase tracking-wide text-blue-400">🌤️ Weather</h3>
                    <button @click="editWeather = !editWeather" class="text-[10px] text-gray-500 hover:text-blue-400">edit</button>
                </div>
                <div x-show="!editWeather">
                    <div class="text-3xl font-bold" x-text="weather.temp + '°C'"></div>
                    <div class="text-gray-400 text-sm" x-text="weather.condition"></div>
                    <div class="text-xs text-gray-500 mt-2" x-text="weather.location"></div>
                </div>
                <div x-show="editWeather" class="space-y-2">
                    <input type="text" x-model="weather.location" placeholder="City" class="w-full bg-black/50 border border-gray-700 rounded-lg px-3 py-2 text-sm">
                    <input type="text" x-model="weather.temp" placeholder="Temperature" class="w-full bg-black/50 border border-gray-700 rounded-lg px-3 py-2 text-sm">
                    <input type="text" x-model="weather.condition" placeholder="Condition" class="w-full bg-black/50 border border-gray-700 rounded-lg px-3 py-2 text-sm">
                    <button @click="editWeather = false; saveToLocal()" class="text-xs bg-blue-600 px-3 py-1 rounded">Save</button>
                </div>
            </div>
            
            <!-- Prayer Times (Manual, bisa diganti sesuai kota) -->
            <div class="glass-card rounded-2xl p-5">
                <h3 class="text-sm font-semibold uppercase tracking-wide text-blue-400 mb-3">🕌 Jadwal Sholat</h3>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between"><span class="text-gray-400">Subuh</span><span x-text="prayers.subuh"></span></div>
                    <div class="flex justify-between"><span class="text-gray-400">Dzuhur</span><span x-text="prayers.dzuhur"></span></div>
                    <div class="flex justify-between"><span class="text-gray-400">Ashar</span><span x-text="prayers.ashar"></span></div>
                    <div class="flex justify-between"><span class="text-gray-400">Maghrib</span><span x-text="prayers.maghrib"></span></div>
                    <div class="flex justify-between"><span class="text-gray-400">Isya</span><span x-text="prayers.isya"></span></div>
                </div>
                <button @click="editPrayers = !editPrayers" class="text-[10px] text-gray-500 hover:text-blue-400 mt-3 w-full text-center">Edit Jadwal</button>
                <div x-show="editPrayers" class="mt-3 space-y-2">
                    <input type="text" x-model="prayers.subuh" class="w-full bg-black/50 border border-gray-700 rounded px-2 py-1 text-xs">
                    <input type="text" x-model="prayers.dzuhur" class="w-full bg-black/50 border border-gray-700 rounded px-2 py-1 text-xs">
                    <input type="text" x-model="prayers.ashar" class="w-full bg-black/50 border border-gray-700 rounded px-2 py-1 text-xs">
                    <input type="text" x-model="prayers.maghrib" class="w-full bg-black/50 border border-gray-700 rounded px-2 py-1 text-xs">
                    <input type="text" x-model="prayers.isya" class="w-full bg-black/50 border border-gray-700 rounded px-2 py-1 text-xs">
                    <button @click="editPrayers = false; saveToLocal()" class="text-xs bg-blue-600 px-3 py-1 rounded">Save</button>
                </div>
            </div>
        </div>
        
        <!-- MIDDLE COLUMN: Tasks + Notes -->
        <div class="space-y-5">
            <!-- Tasks -->
            <div class="glass-card rounded-2xl p-5">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-sm font-semibold uppercase tracking-wide text-blue-400">✅ Tasks</h3>
                    <span class="text-xs text-gray-500" x-text="tasks.filter(t => !t.done).length + ' remaining'"></span>
                </div>
                <div class="space-y-2 max-h-64 overflow-y-auto">
                    <template x-for="(task, idx) in tasks" :key="idx">
                        <div class="flex items-center gap-2 group">
                            <input type="checkbox" x-model="task.done" @change="saveToLocal()" class="w-4 h-4 rounded border-gray-600 bg-transparent accent-blue-500">
                            <span :class="task.done ? 'line-through text-gray-500' : 'text-gray-300'" class="flex-1 text-sm" x-text="task.text"></span>
                            <button @click="deleteTask(idx)" class="text-gray-600 hover:text-red-400 text-xs opacity-0 group-hover:opacity-100 transition">✖</button>
                        </div>
                    </template>
                    <div x-show="tasks.length === 0" class="text-gray-500 text-sm text-center py-4">No tasks. Add one below.</div>
                </div>
                <div class="mt-3 flex gap-2">
                    <input type="text" x-model="newTask" @keyup.enter="addTask()" placeholder="New task..." class="flex-1 bg-black/50 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:border-blue-500">
                    <button @click="addTask()" class="px-4 py-2 bg-blue-600/30 hover:bg-blue-600/50 rounded-lg text-sm">+</button>
                </div>
            </div>
            
            <!-- Notes -->
            <div class="glass-card rounded-2xl p-5">
                <h3 class="text-sm font-semibold uppercase tracking-wide text-blue-400 mb-3">📝 Notes</h3>
                <div class="space-y-3 max-h-80 overflow-y-auto">
                    <template x-for="(note, idx) in notes" :key="idx">
                        <div class="group bg-black/30 rounded-lg p-3">
                            <div class="flex justify-between items-start">
                                <input type="text" x-model="note.title" @blur="saveToLocal()" class="bg-transparent font-semibold text-sm w-full focus:outline-none border-b border-transparent focus:border-blue-500" placeholder="Title">
                                <button @click="deleteNote(idx)" class="text-gray-600 hover:text-red-400 text-xs opacity-0 group-hover:opacity-100 transition ml-2">✖</button>
                            </div>
                            <textarea x-model="note.content" @blur="saveToLocal()" rows="2" class="w-full bg-transparent text-xs text-gray-400 mt-1 focus:outline-none resize-none" placeholder="Write something..."></textarea>
                        </div>
                    </template>
                    <button @click="addNote()" class="w-full py-2 border border-dashed border-gray-700 rounded-lg text-xs text-gray-500 hover:text-blue-400 hover:border-blue-500 transition">+ New Note</button>
                </div>
            </div>
        </div>
        
        <!-- RIGHT COLUMN: Habits + Quote -->
        <div class="space-y-5">
            <!-- Habits Tracker -->
            <div class="glass-card rounded-2xl p-5">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-sm font-semibold uppercase tracking-wide text-blue-400">📊 Habits</h3>
                    <span class="text-xs text-gray-500" x-text="Math.round((habits.filter(h => h.done).length / (habits.length || 1)) * 100) + '%'"></span>
                </div>
                <div class="w-full bg-gray-800 rounded-full h-1.5 mb-4">
                    <div class="bg-gradient-to-r from-blue-500 to-purple-500 h-1.5 rounded-full progress-bar" :style="{ width: (habits.filter(h => h.done).length / (habits.length || 1)) * 100 + '%' }"></div>
                </div>
                <div class="space-y-2 max-h-64 overflow-y-auto">
                    <template x-for="(habit, idx) in habits" :key="idx">
                        <div class="flex items-center gap-2 group">
                            <input type="checkbox" x-model="habit.done" @change="saveToLocal()" class="w-4 h-4 rounded border-gray-600 accent-purple-500">
                            <span :class="habit.done ? 'line-through text-gray-500' : 'text-gray-300'" class="flex-1 text-sm" x-text="habit.name"></span>
                            <span class="text-[9px] text-gray-600" x-text="habit.streak + 'd'"></span>
                            <button @click="deleteHabit(idx)" class="text-gray-600 hover:text-red-400 text-xs opacity-0 group-hover:opacity-100 transition">✖</button>
                        </div>
                    </template>
                </div>
                <div class="mt-3 flex gap-2">
                    <input type="text" x-model="newHabit" @keyup.enter="addHabit()" placeholder="New habit..." class="flex-1 bg-black/50 border border-gray-700 rounded-lg px-3 py-2 text-sm">
                    <button @click="addHabit()" class="px-4 py-2 bg-purple-600/30 hover:bg-purple-600/50 rounded-lg text-sm">+</button>
                </div>
            </div>
            
            <!-- Daily Quote -->
            <div class="glass-card rounded-2xl p-5 text-center">
                <div class="text-2xl mb-2">✨</div>
                <p class="text-sm italic text-gray-300" x-text="quote.text"></p>
                <p class="text-[10px] text-gray-500 mt-2" x-text="'- ' + quote.author"></p>
                <button @click="refreshQuote()" class="text-[10px] text-blue-500 hover:text-blue-400 mt-3">↻ refresh</button>
            </div>
            
            <!-- Storage Info -->
            <div class="glass-card rounded-2xl p-3 text-center text-[10px] text-gray-600">
                💾 Data tersimpan di lokal browser • Last backup: <span x-text="lastBackup || 'never'"></span>
            </div>
        </div>
    </div>
</div>

<script>
function commandCenter() {
    return {
        // Time
        time: '',
        date: '',
        
        // Weather
        weather: { location: 'Cianjur', temp: '28', condition: 'Cloudy' },
        editWeather: false,
        
        // Prayers
        prayers: { subuh: '04:30', dzuhur: '12:00', ashar: '15:30', maghrib: '18:00', isya: '19:15' },
        editPrayers: false,
        
        // Tasks
        tasks: [],
        newTask: '',
        
        // Notes
        notes: [],
        
        // Habits
        habits: [],
        newHabit: '',
        
        // Quote
        quote: { text: 'The only limit is your imagination.', author: 'Unknown' },
        quotesDB: [
            { text: 'Konsistensi lebih penting dari intensitas.', author: 'Atomic Habits' },
            { text: 'Start where you are. Use what you have. Do what you can.', author: 'Arthur Ashe' },
            { text: 'Small daily improvements are the key to staggering long-term results.', author: 'Unknown' },
            { text: 'Discipline is choosing what you want most over what you want now.', author: 'Unknown' },
            { text: 'Jangan menyerah. Momen tersulit seringkali menjadi awal dari kesuksesan.', author: 'BIWWDEV' }
        ],
        
        lastBackup: null,
        
        init() {
            this.loadFromLocal();
            this.updateTime();
            setInterval(() => this.updateTime(), 1000);
            this.refreshQuote();
        },
        
        updateTime() {
            const now = new Date();
            this.time = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            this.date = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        },
        
        addTask() {
            if (this.newTask.trim()) {
                this.tasks.push({ text: this.newTask.trim(), done: false });
                this.newTask = '';
                this.saveToLocal();
            }
        },
        
        deleteTask(idx) {
            this.tasks.splice(idx, 1);
            this.saveToLocal();
        },
        
        addNote() {
            this.notes.push({ title: 'New Note', content: '' });
            this.saveToLocal();
        },
        
        deleteNote(idx) {
            this.notes.splice(idx, 1);
            this.saveToLocal();
        },
        
        addHabit() {
            if (this.newHabit.trim()) {
                this.habits.push({ name: this.newHabit.trim(), done: false, streak: 0 });
                this.newHabit = '';
                this.saveToLocal();
            }
        },
        
        deleteHabit(idx) {
            this.habits.splice(idx, 1);
            this.saveToLocal();
        },
        
        refreshQuote() {
            const random = Math.floor(Math.random() * this.quotesDB.length);
            this.quote = this.quotesDB[random];
        },
        
        saveToLocal() {
            const data = {
                weather: this.weather,
                prayers: this.prayers,
                tasks: this.tasks,
                notes: this.notes,
                habits: this.habits
            };
            localStorage.setItem('commandCenter', JSON.stringify(data));
            this.lastBackup = new Date().toLocaleString();
        },
        
        loadFromLocal() {
            const saved = localStorage.getItem('commandCenter');
            if (saved) {
                const data = JSON.parse(saved);
                this.weather = data.weather || this.weather;
                this.prayers = data.prayers || this.prayers;
                this.tasks = data.tasks || [];
                this.notes = data.notes || [];
                this.habits = data.habits || [];
                this.lastBackup = new Date().toLocaleString();
            } else {
                // Default demo data
                this.tasks = [
                    { text: 'Check dashboard', done: false },
                    { text: 'Review project', done: false }
                ];
                this.notes = [
                    { title: 'Welcome', content: 'Command center siap digunakan. Semua data tersimpan di browser.' }
                ];
                this.habits = [
                    { name: 'Bangun pagi', done: false, streak: 0 },
                    { name: 'Olahraga', done: false, streak: 0 },
                    { name: 'Belajar coding', done: false, streak: 0 }
                ];
            }
        },
        
        exportData() {
            const data = {
                weather: this.weather,
                prayers: this.prayers,
                tasks: this.tasks,
                notes: this.notes,
                habits: this.habits,
                exportedAt: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `command-center-backup-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        },
        
        importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    this.weather = data.weather || this.weather;
                    this.prayers = data.prayers || this.prayers;
                    this.tasks = data.tasks || [];
                    this.notes = data.notes || [];
                    this.habits = data.habits || [];
                    this.saveToLocal();
                    alert('Import successful!');
                } catch (err) {
                    alert('Invalid file');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        },
        
        resetAll() {
            if (confirm('Reset semua data? Tidak bisa dibatalkan.')) {
                localStorage.removeItem('commandCenter');
                location.reload();
            }
        }
    }
}
</script>
</body>
</html>
