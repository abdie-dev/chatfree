<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DarkFeed | Cyber & Exploit News</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Feeder: Library RSS Parser (Ringan) -->
    <script src="https://cdn.jsdelivr.net/npm/feeder@0.2.0/dist/feeder.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .font-mono-custom { font-family: 'JetBrains Mono', monospace; }
        body { background: #050505; }
        /* Dark Hacker Style Cards */
        .glass-card { 
            background: rgba(10, 20, 30, 0.65); 
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.15); 
            transition: all 0.2s ease;
        }
        .glass-card:hover { 
            border-color: rgba(0, 255, 255, 0.6); 
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(0, 255, 255, 0.1);
        }
        .category-active { background: #0ff !important; color: #000 !important; box-shadow: 0 0 10px #0ff; border-color: #0ff !important; font-weight: bold; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #0ff; border-radius: 10px; }
        .loading-spinner { animation: spin 1s linear infinite; border: 2px solid rgba(0, 255, 255, 0.3); border-top-color: #0ff; border-radius: 50%; width: 30px; height: 30px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .glitch-text {
            text-shadow: 0.05em 0 0 rgba(255,0,0,0.75), -0.05em -0.025em 0 rgba(0,255,255,0.75);
            animation: glitch 500ms infinite;
        }
        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,0.75), -0.05em -0.025em 0 rgba(0,255,255,0.75); }
            50% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,0.75), 0.025em 0.05em 0 rgba(0,255,255,0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255,0,0,0.75), -0.025em -0.025em 0 rgba(0,255,255,0.75); }
        }
    </style>
</head>
<body class="text-cyan-400">

<div x-data="exploitFeed()" x-init="init()" class="min-h-screen">
    
    <!-- Header Cyberpunk -->
    <header class="sticky top-0 z-50 glass-card border-b border-cyan-500/30 bg-black/90">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap justify-between items-center gap-3">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-800 flex items-center justify-center shadow-lg shadow-cyan-500/30">
                    <span class="text-sm font-bold">☠️</span>
                </div>
                <h1 class="text-xl font-bold tracking-tighter glitch-text">DARK<span class="text-cyan-300">FEED</span></h1>
                <span class="text-[9px] bg-cyan-950/80 text-cyan-400 px-2 py-0.5 rounded-full border border-cyan-500/30">ZERO-TRUST</span>
            </div>
            <div class="text-[10px] font-mono-custom text-cyan-500/70 bg-black/50 px-2 py-1 rounded">⚡ LIVE EXPLOIT FEEDS</div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        
        <!-- Terminal Status -->
        <div class="mb-5 p-3 bg-black/60 rounded-lg border-l-4 border-cyan-500 font-mono-custom text-xs flex justify-between items-center flex-wrap">
            <div class="flex gap-4">
                <span>> <span x-text="currentSource"></span> MODE ACTIVE</span>
                <span>> <span x-text="articles.length"></span> INTEL PACKAGES</span>
            </div>
            <div class="flex gap-2">
                <span class="text-green-500">🟢</span> <span>ZERO AUTH</span>
                <span class="text-red-500 ml-2">🔴</span> <span>NO API KEY</span>
            </div>
        </div>

        <!-- Source Selector (Tanpa Login, pilih sumber sendiri) -->
        <div class="flex flex-wrap gap-3 mb-8 border-b border-white/10 pb-4">
            <button @click="switchSource('cve')" :class="currentSource === 'cve' ? 'category-active bg-cyan-600 text-black' : 'bg-white/5 hover:bg-white/10 border border-cyan-500/30'"
                    class="px-5 py-2 rounded-full text-sm font-medium transition-all">
                💀 0DAY & EXPLOIT (CVE)
            </button>
            <button @click="switchSource('news')" :class="currentSource === 'news' ? 'category-active bg-cyan-600 text-black' : 'bg-white/5 hover:bg-white/10 border border-cyan-500/30'"
                    class="px-5 py-2 rounded-full text-sm font-medium transition-all">
                🌐 CYBER ATTACK & MALWARE
            </button>
        </div>

        <!-- Loading State -->
        <div x-show="loading" class="flex flex-col justify-center items-center py-20 gap-4">
            <div class="loading-spinner"></div>
            <div class="text-xs text-cyan-600 font-mono">SCRAPING DARK DATA...</div>
        </div>

        <!-- Error State -->
        <div x-show="error" class="text-center py-20 bg-red-950/20 rounded-xl border border-red-500/30">
            <div class="text-red-400 text-lg mb-2">⚠️ CONNECTION LOST</div>
            <p class="text-sm text-gray-400 mb-4" x-text="errorMsg"></p>
            <button @click="fetchData()" class="px-4 py-2 bg-red-600/30 rounded-lg text-sm hover:bg-red-600/50">⟳ RETRY</button>
        </div>

        <!-- News Grid (Menampilkan Exploit & Hacking) -->
        <div x-show="!loading && !error" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            <template x-for="(item, idx) in articles" :key="idx">
                <div class="glass-card rounded-xl overflow-hidden hover:shadow-cyan-500/10 transition-all flex flex-col h-full group">
                    <!-- Header Card: Severity / Source -->
                    <div class="p-3 border-b border-white/10 flex justify-between items-center bg-black/30">
                        <div class="flex items-center gap-2">
                            <span x-show="currentSource === 'cve'" class="text-[9px] font-mono bg-red-900/60 px-2 py-0.5 rounded text-red-300">⚠️ CVE</span>
                            <span x-show="currentSource === 'news'" class="text-[9px] font-mono bg-cyan-900/60 px-2 py-0.5 rounded text-cyan-300">📡 RSS</span>
                            <span class="text-[10px] text-gray-400 font-mono" x-text="item.source"></span>
                        </div>
                        <div x-show="currentSource === 'cve' && item.score" class="text-[10px] font-bold px-2 py-0.5 rounded bg-yellow-900/50 text-yellow-300" x-text="'CVSS: ' + item.score"></div>
                    </div>
                    
                    <!-- Content -->
                    <div class="p-4 flex-1 flex flex-col">
                        <h3 class="font-bold text-base text-cyan-100 group-hover:text-cyan-300 transition line-clamp-2" x-text="item.title"></h3>
                        <p class="text-gray-400 text-xs mt-2 line-clamp-3 font-mono" x-text="item.description || 'No description available.'"></p>
                        
                        <div class="mt-4 flex justify-between items-center pt-3 border-t border-white/10">
                            <a :href="item.link" target="_blank" class="text-[11px] text-cyan-500 hover:text-cyan-300 flex items-center gap-1 font-mono">
                                [+] EXPLOIT INTEL <span>→</span>
                            </a>
                            <span class="text-[9px] text-gray-600" x-text="item.date"></span>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- No Results -->
        <div x-show="!loading && !error && articles.length === 0" class="text-center py-20 border border-dashed border-cyan-500/30 rounded-xl">
            <div class="text-5xl mb-3 opacity-50">🕳️</div>
            <p class="text-gray-400">No intel found.</p>
        </div>
    </main>

    <footer class="border-t border-white/10 mt-8 py-4 text-center text-[9px] text-gray-600 font-mono">
        <div class="max-w-7xl mx-auto px-4">
            <p>🔒 ANONYMOUS MODE • DATA SOURCES: NVD CVE FEED & CYBERSECURITY RSS • NO TRACKING</p>
        </div>
    </footer>
</div>

<script>
function exploitFeed() {
    return {
        currentSource: 'cve',
        articles: [],
        loading: false,
        error: false,
        errorMsg: '',
        
        // Daftar RSS Feed untuk berita hacking/malware (Gratis, No Login) [citation:5][citation:8]
        rssFeeds: [
            { name: "CISA Gov", url: "https://www.cisa.gov/cybersecurity-advisories/advisories.xml", type: "gov" },
            { name: "The Hacker News", url: "https://feeds.feedburner.com/TheHackersNews", type: "news" },
            { name: "SecurityWeek", url: "https://www.securityweek.com/feed", type: "news" },
            { name: "ExploitDB", url: "https://www.exploit-db.com/rss.xml", type: "exploit" }
        ],

        init() {
            this.fetchData();
            // Auto refresh setiap 30 menit (biar dapet CVE terbaru)
            setInterval(() => this.fetchData(), 30 * 60 * 1000);
        },
        
        switchSource(source) {
            this.currentSource = source;
            this.fetchData();
        },
        
        async fetchData() {
            this.loading = true;
            this.error = false;
            
            if (this.currentSource === 'cve') {
                await this.fetchCVE();
            } else {
                await this.fetchRSS();
            }
            
            this.loading = false;
        },
        
        async fetchCVE() {
            try {
                // Menggunakan NVD API (NIST) - 100% Gratis, No API Key Required [citation:2][citation:4]
                // Kita ambil CVE terbaru dari 7 hari terakhir agar dapet "0-day" atau exploit terbaru
                const startDate = new Date();
                startDate.setDate(startDate.getDate() - 7);
                const startDateStr = startDate.toISOString().split('T')[0];
                
                const url = `https://services.nvd.nist.gov/rest/json/cves/2.0?pubStartDate=${startDateStr}T00:00:00.000&resultsPerPage=30`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                const vulnerabilities = data.vulnerabilities || [];
                
                this.articles = vulnerabilities.map(vul => {
                    const cve = vul.cve;
                    const metrics = cve.metrics?.cvssMetricV31?.[0]?.cvssData;
                    const score = metrics?.baseScore || 'N/A';
                    const severity = metrics?.baseSeverity || 'Unknown';
                    
                    return {
                        title: cve.id,
                        description: cve.descriptions?.find(d => d.lang === 'en')?.value || 'No description available. This is a critical security vulnerability.',
                        link: `https://nvd.nist.gov/vuln/detail/${cve.id}`,
                        source: `NVD | ${severity}`,
                        score: score,
                        date: new Date(cve.published).toLocaleDateString()
                    };
                });
                
                if (this.articles.length === 0) throw new Error('No CVEs found');
                
            } catch (err) {
                console.error("CVE Fetch Error:", err);
                this.error = true;
                this.errorMsg = "Failed to fetch exploit data. NVD is still free, check connection.";
                this.setFallbackCVEData();
            }
        },
        
        async fetchRSS() {
            // Untuk berita hacking, kita fetch dari RSS feed (Gratis, No Login) [citation:5]
            // Menggunakan Feeder library untuk parsing RSS
            let allItems = [];
            
            for (const feed of this.rssFeeds) {
                try {
                    // Proxy gratis untuk menghindari CORS (Allows CORS)
                    const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`;
                    const response = await fetch(proxyUrl);
                    const data = await response.json();
                    
                    if (data.status === 'ok' && data.items) {
                        const items = data.items.map(item => ({
                            title: item.title,
                            description: item.description?.replace(/<[^>]*>/g, '').substring(0, 200) || 'Cyber attack or malware alert detected.',
                            link: item.link,
                            source: feed.name,
                            date: new Date(item.pubDate).toLocaleDateString()
                        }));
                        allItems.push(...items);
                    }
                } catch(e) {
                    console.warn(`Failed to fetch ${feed.name}`, e);
                }
            }
            
            // Sorting berdasarkan tanggal (desc)
            allItems.sort((a, b) => new Date(b.date) - new Date(a.date));
            this.articles = allItems.slice(0, 30);
            
            if (this.articles.length === 0) {
                this.setFallbackNewsData();
            }
        },
        
        setFallbackCVEData() {
            // Fallback data jika API error (menampilkan contoh berita exploit populer) [citation:3][citation:9]
            this.articles = [
                { title: "CVE-2025-46341", description: "FreshRSS RCE via HTTP auth impersonation. Unauthenticated attackers can exploit this.", link: "https://nvd.nist.gov/vuln/detail/CVE-2025-46341", source: "NVD | HIGH", score: "7.1", date: "2025-06-04" },
                { title: "Budibase Unauthenticated RCE", description: "Remote Code Execution via Webhook Trigger. Exploit allows root access.", link: "https://github.com/Budibase/budibase/security/advisories/GHSA-fcm4-4pj2-m5hf", source: "GitHub | CRITICAL", score: "9.8", date: "2025-04-01" },
                { title: "phpMyFAQ Config Backup Exploit", description: "Unauthenticated attackers can download database backups containing credentials.", link: "https://exploitdog.ru/cve/github/GHSA-9cg9-4h4f-j6fg", source: "EXPLOIT-DB", score: "7.5", date: "2025-03-15" }
            ];
        },
        
        setFallbackNewsData() {
            this.articles = [
                { title: "WhatsApp Users Targeted by Spyware via Fake iOS App", description: "Italian firm faces legal action after malware campaign.", link: "#", source: "Cyber Intel", date: new Date().toLocaleDateString() },
                { title: "New Chrome Zero-Day Under Active Exploitation", description: "CVE-2026-5281 allows remote code execution. Patch immediately.", link: "#", source: "Google Alert", date: new Date().toLocaleDateString() }
            ];
        }
    }
}
</script>
</body>
</html>
